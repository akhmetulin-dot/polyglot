openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vocabulary learning app API with spaced repetition
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: words
    description: Vocabulary word management
  - name: training
    description: Training session operations
  - name: review
    description: Spaced repetition review operations
  - name: settings
    description: App settings
  - name: stats
    description: Learning statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /words:
    get:
      operationId: listWords
      tags: [words]
      summary: List all words
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search in Russian, Polish, German, English fields
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [frequency, createdAt, russian]
          description: Sort field
        - in: query
          name: limit
          schema:
            type: integer
          description: Page size
        - in: query
          name: offset
          schema:
            type: integer
          description: Page offset
      responses:
        "200":
          description: List of words
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordListResponse"
    post:
      operationId: createWord
      tags: [words]
      summary: Create a new word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordInput"
      responses:
        "201":
          description: Created word
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /words/{id}:
    get:
      operationId: getWord
      tags: [words]
      summary: Get a word by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Word
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateWord
      tags: [words]
      summary: Update a word
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordUpdate"
      responses:
        "200":
          description: Updated word
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteWord
      tags: [words]
      summary: Delete a word
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /words/bulk-import:
    post:
      operationId: bulkImportWords
      tags: [words]
      summary: Import multiple words at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /training/session:
    get:
      operationId: getTrainingSession
      tags: [training]
      summary: Get words for a training session
      description: Returns words due for training (new + words that need repetition due to errors)
      parameters:
        - in: query
          name: count
          schema:
            type: integer
          description: Number of words in session (default 20)
      responses:
        "200":
          description: Training session words
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSession"

  /training/answer:
    post:
      operationId: submitAnswer
      tags: [training]
      summary: Submit answer for a word during training
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: Answer result with feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /training/hint:
    post:
      operationId: requestHint
      tags: [training]
      summary: Request a hint for a word during training
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HintInput"
      responses:
        "200":
          description: Hint recorded and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HintResult"

  /review/due:
    get:
      operationId: getDueReviews
      tags: [review]
      summary: Get words due for spaced repetition review
      parameters:
        - in: query
          name: count
          schema:
            type: integer
          description: Max number of words to return
      responses:
        "200":
          description: Words due for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSession"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall learning statistics
      responses:
        "200":
          description: Learning statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Word:
      type: object
      required: [id, russian, createdAt]
      properties:
        id:
          type: integer
        russian:
          type: string
        polish:
          type: ["string", "null"]
        german:
          type: ["string", "null"]
        english:
          type: ["string", "null"]
        mnemonic:
          type: ["string", "null"]
        frequencyRank:
          type: ["integer", "null"]
          description: Frequency rank in academic dictionary (lower = more frequent)
        correctCount:
          type: integer
          description: Total correct answers across all languages
        hintCount:
          type: integer
          description: Total hints requested
        nextReviewAt:
          type: ["string", "null"]
          format: date-time
          description: When this word is next due for spaced repetition review
        reviewInterval:
          type: integer
          description: Current review interval in days
        createdAt:
          type: string
          format: date-time

    WordInput:
      type: object
      required: [russian]
      properties:
        russian:
          type: string
          minLength: 1
        polish:
          type: string
        german:
          type: string
        english:
          type: string
        mnemonic:
          type: string
        frequencyRank:
          type: integer

    WordUpdate:
      type: object
      properties:
        russian:
          type: string
          minLength: 1
        polish:
          type: string
        german:
          type: string
        english:
          type: string
        mnemonic:
          type: string
        frequencyRank:
          type: integer

    WordListResponse:
      type: object
      required: [words, total]
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/Word"
        total:
          type: integer

    BulkImportInput:
      type: object
      required: [words]
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordInput"

    BulkImportResult:
      type: object
      required: [imported, skipped, errors]
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    TrainingWord:
      type: object
      required: [wordId, russian, correctCount, hintCount]
      properties:
        wordId:
          type: integer
        russian:
          type: string
        mnemonic:
          type: ["string", "null"]
        frequencyRank:
          type: ["integer", "null"]
        correctCount:
          type: integer
        hintCount:
          type: integer

    TrainingSession:
      type: object
      required: [words, sessionId]
      properties:
        sessionId:
          type: string
        words:
          type: array
          items:
            $ref: "#/components/schemas/TrainingWord"

    AnswerInput:
      type: object
      required: [wordId, polish, german, english]
      properties:
        wordId:
          type: integer
        polish:
          type: string
        german:
          type: string
        english:
          type: string

    AnswerResult:
      type: object
      required: [wordId, polishCorrect, germanCorrect, englishCorrect, allCorrect, word]
      properties:
        wordId:
          type: integer
        polishCorrect:
          type: boolean
        germanCorrect:
          type: boolean
        englishCorrect:
          type: boolean
        allCorrect:
          type: boolean
        word:
          $ref: "#/components/schemas/Word"

    HintInput:
      type: object
      required: [wordId]
      properties:
        wordId:
          type: integer

    HintResult:
      type: object
      required: [wordId, mnemonic, polish, german, english, hintCount]
      properties:
        wordId:
          type: integer
        mnemonic:
          type: ["string", "null"]
        polish:
          type: ["string", "null"]
        german:
          type: ["string", "null"]
        english:
          type: ["string", "null"]
        hintCount:
          type: integer

    ReviewSession:
      type: object
      required: [words, total]
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/TrainingWord"
        total:
          type: integer

    Settings:
      type: object
      required: [id, errorRepeatAfter, reviewIntervals, sessionSize, reviewSessionSize]
      properties:
        id:
          type: integer
        errorRepeatAfter:
          type: integer
          description: Repeat wrong word after N words in session
        reviewIntervals:
          type: array
          items:
            type: integer
          description: Spaced repetition intervals in days [1, 3, 7, 14, 30, 90]
        sessionSize:
          type: integer
          description: Default training session word count
        reviewSessionSize:
          type: integer
          description: Default review session word count

    SettingsInput:
      type: object
      properties:
        errorRepeatAfter:
          type: integer
          minimum: 1
          maximum: 20
        reviewIntervals:
          type: array
          items:
            type: integer
        sessionSize:
          type: integer
          minimum: 5
          maximum: 100
        reviewSessionSize:
          type: integer
          minimum: 5
          maximum: 100

    Stats:
      type: object
      required: [totalWords, masteredWords, dueForReview, totalCorrect, totalHints, accuracyPercent, wordsLearnedToday]
      properties:
        totalWords:
          type: integer
        masteredWords:
          type: integer
          description: Words with review interval >= 30 days
        dueForReview:
          type: integer
        totalCorrect:
          type: integer
        totalHints:
          type: integer
        accuracyPercent:
          type: number
          description: Percentage of correct answers without hints
        wordsLearnedToday:
          type: integer
